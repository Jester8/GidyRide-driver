name: Mac Session
on: workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mac-session:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Start interactive SSH session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 55
